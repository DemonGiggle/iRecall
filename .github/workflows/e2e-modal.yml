name: E2E Modal Test

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          nohup go run ./web --port 9528 --unsafe-no-password-check > /tmp/irecall-e2e.log 2>&1 &
          # wait for server
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:9528/ >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! curl -sSf http://127.0.0.1:9528/ >/dev/null 2>&1; then
            sed -n '1,200p' /tmp/irecall-e2e.log
            exit 1
          fi
          sed -n '1,200p' /tmp/irecall-e2e.log

      - name: Run E2E script
        working-directory: frontend
        run: |
          node ./tests/e2e/run.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: frontend/*.png
